	// get color depending on population density value
function getColor(winner) {
    if (winner === "Trump") {
        return "#ff0000";   // red
    } else if (winner === "Clinton") {
        return "#0000ff";   // blue
    } else {
        return "#cccccc";   // gray fallback for any unexpected value
    }
}

	function style(feature) {
    return {
        fillColor: getColor(feature.properties.winner),
        weight: 2,
        opacity: 1,
        color: 'white',
        dashArray: '3',
        fillOpacity: 0.7
    };
}
